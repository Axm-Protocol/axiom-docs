<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0e1a;
  --bg-sidebar: #080c16;
  --bg-surface: #0f1525;
  --bg-code: #0d1117;
  --bg-hover: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.1);
  --text: #e0e0e0;
  --text-muted: #8892a4;
  --text-heading: #ffffff;
  --cyan: #00e5ff;
  --purple: #9945ff;
  --gold: #ffd740;
  --red: #ff5252;
  --green: #69f0ae;
  --sidebar-w: 270px;
  --toc-w: 220px;
  --content-max: 820px;
  --font-display: 'Cabinet Grotesk', sans-serif;
  --font-body: 'Satoshi', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
  font-weight: 400;
  overflow-x: hidden;
  min-height: 100vh;
}

a { color: var(--cyan); text-decoration: none; transition: opacity 0.15s; }
a:hover { opacity: 0.8; }

::selection { background: rgba(0,229,255,0.2); color: #fff; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* ===== LAYOUT ===== */
.layout {
  display: flex;
  min-height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  overflow: hidden;
  transition: transform 0.3s var(--ease);
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.sidebar-logo svg {
  flex-shrink: 0;
}

.sidebar-logo-text {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 20px;
  color: var(--text-heading);
  letter-spacing: -0.02em;
}

.sidebar-logo-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--cyan);
  font-weight: 500;
  letter-spacing: 0.05em;
}

.sidebar-search {
  position: relative;
}

.sidebar-search input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 36px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}

.sidebar-search input::placeholder { color: var(--text-muted); }
.sidebar-search input:focus { border-color: var(--cyan); }

.sidebar-search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  width: 14px;
  height: 14px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

.sidebar-section {
  margin-bottom: 4px;
}

.sidebar-section-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 20px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: color 0.15s;
}

.sidebar-section-toggle:hover { color: var(--text); }

.sidebar-section-toggle .chevron {
  width: 12px;
  height: 12px;
  transition: transform 0.2s var(--ease);
  flex-shrink: 0;
}

.sidebar-section.collapsed .chevron { transform: rotate(-90deg); }
.sidebar-section.collapsed .sidebar-section-items { display: none; }

.sidebar-section-items {
  padding: 2px 0 8px;
}

.sidebar-link {
  display: block;
  padding: 6px 20px 6px 28px;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 400;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  cursor: pointer;
  text-decoration: none;
}

.sidebar-link:hover {
  color: var(--text);
  background: var(--bg-hover);
  opacity: 1;
}

.sidebar-link.active {
  color: var(--cyan);
  border-left-color: var(--cyan);
  background: rgba(0,229,255,0.05);
  font-weight: 500;
}

.sidebar-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-footer a {
  font-size: 11px;
  color: var(--text-muted);
}

/* ===== MAIN ===== */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
  display: flex;
  justify-content: center;
}

.main-inner {
  width: 100%;
  max-width: calc(var(--content-max) + var(--toc-w) + 80px);
  display: flex;
  padding: 0 40px;
}

.content {
  flex: 1;
  max-width: var(--content-max);
  padding: 32px 0 80px;
  min-width: 0;
}

/* ===== TOC (RIGHT) ===== */
.toc {
  width: var(--toc-w);
  flex-shrink: 0;
  padding-top: 80px;
  margin-left: 40px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.toc-title {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.toc-link {
  display: block;
  padding: 4px 0 4px 12px;
  color: var(--text-muted);
  font-size: 13px;
  border-left: 1px solid var(--border);
  transition: all 0.15s;
  text-decoration: none;
  line-height: 1.5;
}

.toc-link:hover { color: var(--text); opacity: 1; }
.toc-link.active {
  color: var(--cyan);
  border-left-color: var(--cyan);
}

/* ===== BREADCRUMB ===== */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.breadcrumb a { color: var(--text-muted); }
.breadcrumb a:hover { color: var(--cyan); }
.breadcrumb .sep { opacity: 0.4; }

/* ===== ARTICLE CONTENT ===== */
.article h1 {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 800;
  color: var(--text-heading);
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin-bottom: 16px;
}

.article h2 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 700;
  color: var(--text-heading);
  letter-spacing: -0.02em;
  margin: 40px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  scroll-margin-top: 20px;
}

.article h3 {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--text-heading);
  margin: 28px 0 12px;
  scroll-margin-top: 20px;
}

.article h2 .heading-anchor,
.article h3 .heading-anchor {
  opacity: 0;
  margin-left: 6px;
  color: var(--text-muted);
  font-size: 0.85em;
  cursor: pointer;
  transition: opacity 0.15s;
}

.article h2:hover .heading-anchor,
.article h3:hover .heading-anchor { opacity: 0.5; }

.article h2 .heading-anchor:hover,
.article h3 .heading-anchor:hover { opacity: 1; color: var(--cyan); }

.article p {
  margin-bottom: 16px;
  color: var(--text);
}

.article ul, .article ol {
  margin: 0 0 16px 20px;
}

.article li {
  margin-bottom: 6px;
}

.article strong { color: var(--text-heading); font-weight: 600; }

.article .lead {
  font-size: 17px;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 24px;
}

/* ===== CODE BLOCKS ===== */
.code-block {
  position: relative;
  margin: 16px 0 24px;
  background: var(--bg-code);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.code-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}

.code-block pre {
  margin: 0;
  padding: 16px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.65;
  color: var(--text);
}

.copy-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}

.copy-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.copy-btn.copied { border-color: var(--green); color: var(--green); }

/* Syntax highlight classes */
.tok-kw { color: #ff79c6; }
.tok-str { color: #f1fa8c; }
.tok-fn { color: #8be9fd; }
.tok-cm { color: #6272a4; }
.tok-num { color: #bd93f9; }
.tok-op { color: #ff79c6; }
.tok-const { color: #50fa7b; }
.tok-type { color: #8be9fd; }

/* Inline code */
.article code:not(pre code) {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: rgba(255,255,255,0.06);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--cyan);
}

/* ===== CALLOUT BOXES ===== */
.callout {
  margin: 20px 0 24px;
  padding: 16px 20px;
  border-radius: 8px;
  border-left: 3px solid;
  background: var(--bg-surface);
}

.callout-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 8px;
}

.callout-body {
  font-size: 14px;
  line-height: 1.6;
}

.callout.info { border-color: var(--cyan); }
.callout.info .callout-title { color: var(--cyan); }
.callout.warning { border-color: var(--gold); }
.callout.warning .callout-title { color: var(--gold); }
.callout.danger { border-color: var(--red); }
.callout.danger .callout-title { color: var(--red); }
.callout.tip { border-color: var(--green); }
.callout.tip .callout-title { color: var(--green); }

/* ===== TABLES ===== */
.table-wrap {
  overflow-x: auto;
  margin: 16px 0 24px;
  border: 1px solid var(--border);
  border-radius: 8px;
}

.article table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.article table th {
  background: rgba(255,255,255,0.04);
  text-align: left;
  padding: 10px 16px;
  font-weight: 600;
  color: var(--text-heading);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.article table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}

.article table tr:last-child td { border-bottom: none; }
.article table tr:nth-child(even) td { background: rgba(255,255,255,0.015); }

/* ===== FEATURE GRID ===== */
.feature-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin: 24px 0;
}

.feature-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: border-color 0.2s, transform 0.2s;
}

.feature-card:hover {
  border-color: rgba(0,229,255,0.2);
  transform: translateY(-2px);
}

.feature-card-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 18px;
}

.feature-card h4 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-heading);
  margin-bottom: 6px;
}

.feature-card p {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  margin: 0;
}

/* ===== TIMELINE ===== */
.timeline {
  position: relative;
  margin: 24px 0;
  padding-left: 32px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 4px;
  bottom: 4px;
  width: 2px;
  background: linear-gradient(180deg, var(--cyan), var(--purple));
  border-radius: 1px;
}

.timeline-item {
  position: relative;
  margin-bottom: 28px;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -25px;
  top: 6px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--cyan);
  border: 2px solid var(--bg);
  z-index: 1;
}

.timeline-item:nth-child(2)::before { background: var(--purple); }
.timeline-item:nth-child(3)::before { background: var(--gold); }
.timeline-item:nth-child(4)::before { background: var(--green); }
.timeline-item:nth-child(5)::before { background: var(--cyan); }

.timeline-label {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--cyan);
  margin-bottom: 4px;
}

.timeline-content h4 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-heading);
  margin-bottom: 4px;
}

.timeline-content p {
  font-size: 14px;
  color: var(--text-muted);
  margin: 0;
}

/* ===== ACCORDION (FAQ) ===== */
.accordion-item {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
  background: var(--bg-surface);
}

.accordion-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: none;
  border: none;
  color: var(--text-heading);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  transition: color 0.15s;
}

.accordion-trigger:hover { color: var(--cyan); }

.accordion-trigger .acc-icon {
  width: 18px;
  height: 18px;
  color: var(--text-muted);
  transition: transform 0.2s var(--ease);
  flex-shrink: 0;
}

.accordion-item.open .accordion-trigger .acc-icon { transform: rotate(180deg); }

.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s var(--ease);
}

.accordion-body-inner {
  padding: 0 20px 16px;
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
}

/* ===== LINK CARDS GRID ===== */
.link-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin: 24px 0;
}

.link-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  transition: border-color 0.2s, transform 0.15s;
}

.link-card:hover {
  border-color: var(--cyan);
  transform: translateY(-1px);
  opacity: 1;
}

.link-card-icon {
  font-size: 20px;
  flex-shrink: 0;
}

.link-card-text {
  font-weight: 600;
  font-size: 14px;
  color: var(--text-heading);
}

.link-card-url {
  font-size: 12px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== STEPS ===== */
.steps {
  counter-reset: steps;
  margin: 20px 0;
}

.step {
  counter-increment: steps;
  position: relative;
  padding-left: 40px;
  margin-bottom: 24px;
}

.step::before {
  content: counter(steps);
  position: absolute;
  left: 0;
  top: 0;
  width: 28px;
  height: 28px;
  background: rgba(0,229,255,0.1);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--cyan);
  line-height: 1;
  text-align: center;
  padding-top: 1px;
}

.step h4 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  color: var(--text-heading);
  margin-bottom: 4px;
}

.step p {
  font-size: 14px;
  color: var(--text-muted);
  margin: 0;
}

/* ===== FUNC LIST ===== */
.func-item {
  margin-bottom: 16px;
  padding: 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.func-sig {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--cyan);
  margin-bottom: 6px;
  font-weight: 500;
}

.func-desc {
  font-size: 13px;
  color: var(--text-muted);
}

.func-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  margin-left: 8px;
  vertical-align: middle;
}

.func-badge.admin {
  background: rgba(153,69,255,0.15);
  color: var(--purple);
}

/* ===== PREV / NEXT ===== */
.page-nav {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

.page-nav-item {
  display: flex;
  flex-direction: column;
  padding: 16px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  transition: border-color 0.2s;
  min-width: 0;
  max-width: 48%;
}

.page-nav-item:hover { border-color: var(--cyan); opacity: 1; }
.page-nav-item.next { margin-left: auto; text-align: right; }

.page-nav-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.page-nav-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-heading);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ===== SEARCH MODAL ===== */
.search-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  align-items: flex-start;
  justify-content: center;
  padding-top: 100px;
  backdrop-filter: blur(4px);
}

.search-modal-overlay.open { display: flex; }

.search-modal {
  width: 600px;
  max-width: 90vw;
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  overflow: hidden;

// ===== METEORA INTEGRATION =====
'meteora-integration': `
<p class="lead">AXIOM uses Meteora Dynamic AMM (DAMM v1) for its liquidity pool — a strategic choice that enables permanent liquidity locking while retaining trading fee revenue.</p>

<h2 id="why-meteora">Why Meteora over Raydium?</h2>
<p>Unlike traditional DEXs, Meteora allows creators to <strong>permanently lock liquidity</strong> while retaining the right to claim trading fees forever. This is a game-changer for token projects.</p>

<div class="table-wrap">
<table>
  <thead><tr><th>Feature</th><th>Meteora DAMM v1</th><th>Raydium</th></tr></thead>
  <tbody>
    <tr><td><strong>Fee on locked LP</strong></td><td style="color:var(--green)">Yes — claim forever</td><td style="color:var(--red)">No — lost on burn</td></tr>
    <tr><td><strong>Dynamic fees</strong></td><td style="color:var(--green)">Yes — adjusts to volatility</td><td>Fixed</td></tr>
    <tr><td><strong>Jupiter integration</strong></td><td>Yes — auto-routed</td><td>Yes</td></tr>
    <tr><td><strong>TVL</strong></td><td>$1B+</td><td>$500M+</td></tr>
  </tbody>
</table>
</div>

<h2 id="protocol-fee">Protocol Fee Structure</h2>
<ul>
  <li><strong>5%</strong> of the dynamic fee goes to Meteora protocol</li>
  <li>The remaining <strong>95%</strong> goes to the LP position holder (AXIOM)</li>
  <li>Fees are claimable at any time, even with locked LP tokens</li>
</ul>
<p>SDK: <code>@mercurial-finance/dynamic-amm-sdk</code></p>

<h2 id="code-example">Code Example</h2>
<div class="code-block">
  <div class="code-block-header"><span>javascript</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
  <pre><span class="tok-kw">import</span> AmmImpl <span class="tok-kw">from</span> <span class="tok-str">"@mercurial-finance/dynamic-amm-sdk"</span>;

<span class="tok-cm">// Create pool</span>
<span class="tok-kw">const</span> txHash = <span class="tok-kw">await</span> AmmImpl.<span class="tok-fn">createPermissionlessPool</span>(
  connection,
  wallet.publicKey,
  tokenAMint,
  tokenBMint,
  tokenAAmount,
  tokenBAmount,
  <span class="tok-const">false</span> <span class="tok-cm">// not stable pool</span>
);

<span class="tok-cm">// Lock LP permanently (preserves fee claims)</span>
<span class="tok-kw">const</span> pool = <span class="tok-kw">await</span> AmmImpl.<span class="tok-fn">create</span>(connection, poolAddress);
<span class="tok-kw">await</span> pool.<span class="tok-fn">lockLiquidity</span>(wallet.publicKey, lpAmount);

<span class="tok-cm">// Claim fees anytime</span>
<span class="tok-kw">await</span> pool.<span class="tok-fn">claimLockFee</span>(wallet.publicKey, poolAddress);</pre>
</div>

<h2 id="integration-details">Integration Details</h2>
<p>The AXIOM presale contract automatically migrates raised SOL and allocated AXM tokens to a Meteora DAMM v1 pool upon successful presale finalization. LP tokens are then permanently locked via the <code>lockLiquidity</code> method.</p>
<p>The protocol retains the right to claim accumulated trading fees at any time via <code>claimLockFee</code>, creating a sustainable revenue stream that aligns team incentives with long-term token health.</p>
`,

'building-agents': `
<p class="lead">Create autonomous AI agents that manage real-world assets on the AXIOM marketplace. Earn AXM fees when users subscribe.</p>

<h2 id="agent-structure">Agent Structure</h2>

  <li>Reports performance to the Agent Registry</li>

<h2 id="create-agent">Creating Your First Agent</h2>
<div class="code-block">

  <pre><span class="tok-kw">import</span> { AxiomAgent, AgentConfig } <span class="tok-kw">from</span> <span class="tok-str">"@axm-protocol/agent-sdk"</span>;

  name: <span class="tok-str">"Gold-Rebalancer"</span>,
  description: <span class="tok-str">"Rebalances between SOL and tokenized gold"</span>,
  category: <span class="tok-str">"commodities"</span>,
  riskLevel: <span class="tok-str">"medium"</span>,

    performanceFee: <span class="tok-num">0.05</span>,        <span class="tok-cm">// 5% of profits</span>
  },
};

<span class="tok-cm">// 2. Create and define strategy</span>
<span class="tok-kw">const</span> agent = <span class="tok-kw">new</span> <span class="tok-type">AxiomAgent</span>(config);

// ===== SIDEBAR RENDERING =====
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = SECTIONS.map(section => `
    <div class="sidebar-section" data-section="${section.title}">
      <button class="sidebar-section-toggle" onclick="toggleSection(this.parentElement)">
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        ${section.title}
      </button>
      <div class="sidebar-section-items">
        ${section.pages.map(p => `<a class="sidebar-link" data-page="${p.id}" onclick="navigateTo('${p.id}')">${p.title}</a>`).join('')}
      </div>
    </div>
  `).join('');
}

function toggleSection(el) {
  el.classList.toggle('collapsed');
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobileOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}

// ===== ROUTING =====
function getPageId() {
  const hash = window.location.hash.replace('#/', '').replace('#', '');
  return hash || 'introduction';
}

function navigateTo(id) {
  window.location.hash = '#/' + id;
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('open');
}

function renderPage() {
  const id = getPageId();
  const page = allPages.find(p => p.id === id);
  if (!page) { navigateTo('introduction'); return; }

  const content = document.getElementById('content');
  const html = getPageContent(id);

  // Breadcrumb
  const breadcrumb = `<div class="breadcrumb"><a onclick="navigateTo('introduction')">AXIOM</a><span class="sep">›</span><span>${page.section}</span><span class="sep">›</span><span>${page.title}</span></div>`;

  // Title
  const title = `<div class="article"><h1>${page.title}</h1>${html}</div>`;

  // Prev/Next
  const idx = allPages.findIndex(p => p.id === id);
  const prev = idx > 0 ? allPages[idx - 1] : null;
  const next = idx < allPages.length - 1 ? allPages[idx + 1] : null;

  let pageNav = '<div class="page-nav">';
  if (prev) {
    pageNav += `<a class="page-nav-item" onclick="navigateTo('${prev.id}')"><span class="page-nav-label">← Previous</span><span class="page-nav-title">${prev.title}</span></a>`;
  }
  if (next) {
    pageNav += `<a class="page-nav-item next" onclick="navigateTo('${next.id}')"><span class="page-nav-label">Next →</span><span class="page-nav-title">${next.title}</span></a>`;
  }
  pageNav += '</div>';

  content.innerHTML = breadcrumb + title + pageNav;

  // Add anchor links to headings
  content.querySelectorAll('h2[id], h3[id]').forEach(h => {
    const anchor = document.createElement('span');
    anchor.className = 'heading-anchor';
    anchor.textContent = '#';
    anchor.onclick = (e) => {
      e.preventDefault();
      const url = window.location.origin + window.location.pathname + '#/' + id + '?' + h.id;
      navigator.clipboard.writeText(url);
      anchor.textContent = '✓';
      setTimeout(() => anchor.textContent = '#', 1500);
    };
    h.appendChild(anchor);
  });

  // Active sidebar link
  document.querySelectorAll('.sidebar-link').forEach(l => {
    l.classList.toggle('active', l.dataset.page === id);
  });

  // Expand the correct section
  SECTIONS.forEach(section => {
    const el = document.querySelector(`.sidebar-section[data-section="${section.title}"]`);
    if (section.pages.some(p => p.id === id)) {
      el.classList.remove('collapsed');
    }
  });

  // Render TOC
  renderTOC();

  // Scroll to top
  window.scrollTo(0, 0);

  // Re-animate
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = '';
}

// ===== TOC =====
function renderTOC() {
  const toc = document.getElementById('toc');
  const headings = document.querySelectorAll('.article h2[id], .article h3[id]');
  if (headings.length === 0) { toc.innerHTML = ''; return; }

  let html = '<div class="toc-title">On this page</div>';
  headings.forEach(h => {
    const indent = h.tagName === 'H3' ? ' style="padding-left:24px;font-size:12px"' : '';
    html += `<a class="toc-link" href="javascript:void(0)" onclick="scrollToHeading('${h.id}')"${indent}>${h.textContent.replace('#', '').trim()}</a>`;
  });
  toc.innerHTML = html;

  // Scroll spy
  updateTocActive();
}

function scrollToHeading(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateTocActive() {
  const headings = document.querySelectorAll('.article h2[id], .article h3[id]');
  const tocLinks = document.querySelectorAll('.toc-link');
  if (!headings.length) return;

  let activeIdx = 0;
  headings.forEach((h, i) => {
    if (h.getBoundingClientRect().top <= 80) activeIdx = i;
  });

  tocLinks.forEach((l, i) => l.classList.toggle('active', i === activeIdx));
}

window.addEventListener('scroll', updateTocActive, { passive: true });

// ===== COPY CODE =====
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ===== ACCORDION =====
function toggleAccordion(el) {
  const wasOpen = el.classList.contains('open');
  el.classList.toggle('open');
  const body = el.querySelector('.accordion-body');
  if (wasOpen) {
    body.style.maxHeight = '0';
  } else {
    body.style.maxHeight = body.scrollHeight + 'px';
  }
}

// ===== SEARCH =====
function openSearch() {
  const overlay = document.getElementById('searchOverlay');
  overlay.classList.add('open');
  const input = document.getElementById('searchInput');
  input.value = '';
  input.focus();
  renderSearchResults('');
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
}

document.getElementById('searchOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('searchOverlay')) closeSearch();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  renderSearchResults(e.target.value);
});

let searchFocusIdx = -1;

function renderSearchResults(query) {
  const container = document.getElementById('searchResults');
  searchFocusIdx = -1;

  if (!query.trim()) {
    container.innerHTML = '<div class="search-no-results">Type to search documentation…</div>';
    return;
  }

  const q = query.toLowerCase();
  const results = [];

  allPages.forEach(page => {
    const content = getPageContent(page.id);
    const plainText = content.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
    const titleMatch = page.title.toLowerCase().includes(q);
    const contentMatch = plainText.toLowerCase().includes(q);

    if (titleMatch || contentMatch) {
      let snippet = '';
      if (contentMatch) {
        const idx = plainText.toLowerCase().indexOf(q);
        const start = Math.max(0, idx - 40);
        const end = Math.min(plainText.length, idx + q.length + 60);
        snippet = (start > 0 ? '…' : '') + plainText.substring(start, end) + (end < plainText.length ? '…' : '');
      }
      results.push({ ...page, snippet, titleMatch });
    }
  });

  // Sort: title matches first
  results.sort((a, b) => (b.titleMatch ? 1 : 0) - (a.titleMatch ? 1 : 0));

  if (results.length === 0) {
    container.innerHTML = '<div class="search-no-results">No results found for "' + query + '"</div>';
    return;
  }

  container.innerHTML = results.map((r, i) => `
    <a class="search-result-item" data-idx="${i}" onclick="navigateTo('${r.id}');closeSearch()">
      <div class="search-result-section">${r.section}</div>
      <div class="search-result-title">${r.title}</div>
      ${r.snippet ? `<div class="search-result-snippet">${r.snippet}</div>` : ''}
    </a>
  `).join('');
}

// Keyboard navigation for search
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  const items = document.querySelectorAll('.search-result-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchFocusIdx = Math.min(searchFocusIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchFocusIdx = Math.max(searchFocusIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIdx));
  } else if (e.key === 'Enter' && searchFocusIdx >= 0) {
    e.preventDefault();
    items[searchFocusIdx]?.click();
  } else if (e.key === 'Escape') {
    closeSearch();
  }
});

// Global keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Cmd/Ctrl + K for search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
  // Escape to close search
  if (e.key === 'Escape') closeSearch();

  // Arrow keys for prev/next (only when search is not open)
  if (!document.getElementById('searchOverlay').classList.contains('open')) {
    const id = getPageId();
    const idx = allPages.findIndex(p => p.id === id);
    if (e.key === 'ArrowLeft' && idx > 0) {
      navigateTo(allPages[idx - 1].id);
    } else if (e.key === 'ArrowRight' && idx < allPages.length - 1) {
      navigateTo(allPages[idx + 1].id);
    }
  }
});

// ===== INIT =====
window.addEventListener('hashchange', renderPage);
renderSidebar();
renderPage();
</script>
